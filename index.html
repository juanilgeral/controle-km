<html lang="pt-BR">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
        
        .section {
            display: flex;
            flex-direction: column;
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ff5252;
        }
        
        .btn-maps {
            background: #4285F4;
            color: white;
            padding: 6px 12px;
            font-size: 0.85em;
            margin-top: 0;
        }
        
        .btn-maps:hover {
            background: #357ae8;
        }
        
        .stats {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
            font-weight: 600;
        }
        
        .stat-value {
            color: #667eea;
            font-weight: 700;
            font-size: 1.2em;
        }
        
        .visited-list {
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 0;
        }
        
        .visited-item {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            transition: background 0.2s;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .visited-item:hover {
            background: #f8f9fa;
        }
        
        .visited-item:last-child {
            border-bottom: none;
        }
        
        .visited-info {
            flex: 1;
            min-width: 150px;
        }
        
        .visited-name {
            font-weight: 600;
            color: #333;
        }
        
        .visited-km {
            color: #667eea;
            font-size: 0.9em;
            margin-top: 4px;
        }
        
        .visited-actions {
            display: flex;
            gap: 6px;
        }
        
        .visited-remove {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.2s;
        }
        
        .visited-remove:hover {
            background: #ff5252;
        }
        
        .empty-message {
            padding: 20px;
            text-align: center;
            color: #999;
        }
        
        .color-legend {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        
        .legend-item:last-child {
            margin-bottom: 0;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 10px;
        }
        
        .color-verde { background: #92D050; }
        .color-amarelo { background: #FFFF00; }
        .color-laranja { background: #FFC000; }
        .color-rosa { background: #FF99CC; }
        
        .total-km {
            font-size: 2.5em;
            color: #667eea;
            font-weight: 700;
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .action-buttons button {
            flex: 1;
            margin-top: 0;
            min-width: 120px;
        }
        
        .search-box {
            margin-bottom: 15px;
        }
        
        .filter-status {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>

            </div>
            
            <!-- Seção Direita: Resumo e Lista -->

                </div>

                    <button class="btn-danger" onclick="limparTudo()">🗑️ Limpar Tudo</button>
                </div>
            </div>
        </div>
    </div>

        let visitadas = [];
        let lojaAtualSelecionada = null;
        
        // Inicializar
        function inicializar() {
            preencherSelect();
            carregarDoLocalStorage();
            atualizarUI();
        }
        
        function preencherSelect() {
            const select = document.getElementById('loja-select');
            lojas.forEach(loja => {
                const option = document.createElement('option');
                option.value = loja.cod;
                option.textContent = `${loja.nome} (${loja.uf}) - ${loja.km} km`;
                select.appendChild(option);
            });
        }
        
        function adicionarVisita() {
            const select = document.getElementById('loja-select');
            const custom = document.getElementById('loja-custom');
            let lojaEscolhida = null;
            
            if (select.value) {
                lojaEscolhida = lojas.find(l => l.cod == select.value);
            } else if (custom.value.trim()) {
                const nome = custom.value.trim().toUpperCase();
                lojaEscolhida = lojas.find(l => l.nome.toUpperCase().includes(nome));
            }
            
            if (!lojaEscolhida) {
                alert('Selecione uma loja válida!');
                return;
            }
            
            if (visitadas.find(v => v.cod === lojaEscolhida.cod)) {
                alert('Esta loja já foi registrada!');
                return;
            }
            
            visitadas.push(lojaEscolhida);
            salvarNoLocalStorage();
            atualizarUI();
            
            select.value = '';
            custom.value = '';
            document.getElementById('km-input').value = '';
            lojaAtualSelecionada = null;
            document.getElementById('btn-maps-verify').style.display = 'none';
        }
        
        function removerVisita(cod) {
            visitadas = visitadas.filter(v => v.cod !== cod);
            salvarNoLocalStorage();
            atualizarUI();
        }
        
        function verificarNoMaps() {
            if (!lojaAtualSelecionada) {
                alert('Selecione uma loja primeiro!');
                return;
            }
            
            const origin = "Estr. Camboatá, 689, Queimados - RJ, 26379-160";
            const destination = `Casa & Video ${lojaAtualSelecionada.nome}, ${lojaAtualSelecionada.uf}, Brasil`;
            const url = `https://www.google.com/maps/dir/${encodeURIComponent(origin)}/${encodeURIComponent(destination)}`;
            window.open(url, '_blank');
        }
        
        function atualizarUI() {
            document.getElementById('total-lojas').textContent = visitadas.length;
            
            const totalKm = visitadas.reduce((sum, v) => sum + v.km, 0);
            document.getElementById('total-km').textContent = totalKm.toFixed(1) + ' km';
            
            const mediaKm = visitadas.length > 0 ? (totalKm / visitadas.length).toFixed(1) : 0;
            document.getElementById('media-km').textContent = mediaKm + ' km';
            
            const lista = document.getElementById('visited-list');
            if (visitadas.length === 0) {
                lista.innerHTML = '<div class="empty-message">Nenhuma loja visitada ainda</div>';
            } else {
                lista.innerHTML = visitadas.map(v => `
                    <div class="visited-item">
                        <div class="visited-info">
                            <div class="visited-name">${v.nome}</div>
                            <div class="visited-km">${v.km} km | ${v.uf}</div>
                        </div>
                        <div class="visited-actions">
                            <button class="btn-maps" onclick="abrirMapsDaVisita('${v.nome}', '${v.uf}')">🗺️</button>
                            <button class="visited-remove" onclick="removerVisita(${v.cod})">Remover</button>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function abrirMapsDaVisita(nome, uf) {
            const origin = "Estr. Camboatá, 689, Queimados - RJ, 26379-160";
            const destination = `Casa & Video ${nome}, ${uf}, Brasil`;
            const url = `https://www.google.com/maps/dir/${encodeURIComponent(origin)}/${encodeURIComponent(destination)}`;
            window.open(url, '_blank');
        }
        
        function salvarNoLocalStorage() {
            localStorage.setItem('visitadas', JSON.stringify(visitadas));
        }
        
        function carregarDoLocalStorage() {
            const dados = localStorage.getItem('visitadas');
            if (dados) {
                visitadas = JSON.parse(dados);
            }
        }
        
        function exportarCSV() {
            if (visitadas.length === 0) {
                alert('Nenhuma loja para exportar!');
                return;
            }
            
            let csv = 'COD,LOJA,UF,KM\n';
            visitadas.forEach(v => {
                csv += `${v.cod},"${v.nome}",${v.uf},${v.km}\n`;
            });
            
            const totalKm = visitadas.reduce((sum, v) => sum + v.km, 0);
            csv += `\nTOTAL KM:,${totalKm.toFixed(1)}\n`;
            csv += `TOTAL LOJAS:,${visitadas.length}\n`;
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `visitas_casavideo_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
        
        function limparTudo() {
            if (confirm('Tem certeza que deseja limpar todas as visitas?')) {
                visitadas = [];
                salvarNoLocalStorage();
                atualizarUI();
            }
        }
        
        // Atualizar KM quando selecionar loja
        document.getElementById('loja-select').addEventListener('change', function() {
            if (this.value) {
                lojaAtualSelecionada = lojas.find(l => l.cod == this.value);
                document.getElementById('km-input').value = lojaAtualSelecionada.km + ' km';
                document.getElementById('btn-maps-verify').style.display = 'block';
            } else {
                document.getElementById('km-input').value = '';
                lojaAtualSelecionada = null;
                document.getElementById('btn-maps-verify').style.display = 'none';
            }
        });
        
        window.addEventListener('load', inicializar);
    </script>
